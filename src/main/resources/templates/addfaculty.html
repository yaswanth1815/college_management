<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Faculty</title>
    <style>
        :root[data-theme="light"] {
            --bg-color: #f4f6f9; --card-bg: #ffffff; --text-main: #2c3e50; --text-sub: #7f8c8d;
            --toggle-bg: #cbd5e1; --toggle-btn: #ffffff; --input-bg: #ffffff; --input-border: #cccccc;
        }
        :root[data-theme="dark"] {
            --bg-color: #121212; --card-bg: #1e1e1e; --text-main: #f3f4f6; --text-sub: #9ca3af;
            --toggle-bg: #4b5563; --toggle-btn: #10b981; --input-bg: #2d2d2d; --input-border: #444444;
        }
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Segoe UI', sans-serif; 
            transition: background-color 0.3s, color 0.3s; 
        }

        /* Crucial rules to prevent scrolling entirely */
        html, body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* Flexbox centers the card perfectly in the middle of the screen */
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container { 
            width: 100%;
            max-width: 500px; /* Made slightly tighter for a cleaner look */
        }
        
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 15px; /* Reduced to fit screen */
        }
        header h1 { font-size: 1.5rem; } /* Slightly smaller header */
        
        .theme-switch-wrapper { display: flex; align-items: center; gap: 10px; }
        .theme-switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .theme-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--toggle-bg); border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: var(--toggle-btn); border-radius: 50%; transition: transform 0.3s ease; }
        input:checked + .slider:before { transform: translateX(22px);background-color:#9b59b6 ; }
        
        .card { 
            background: var(--card-bg); 
            border-radius: 12px; 
            padding: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            border-top: 5px solid #9b59b6; 
        }

        /* Compact form spacing to eliminate overflow */
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.85rem; letter-spacing: 0.3px;}
        
        .form-control { 
            width: 100%; 
            padding: 10px 12px; 
            border: 1px solid var(--input-border); 
            border-radius: 6px; 
            background-color: var(--input-bg); 
            color: var(--text-main); 
            font-size: 0.95rem; 
            outline: none; 
        }
        .form-control:focus { border-color: #9b59b6; } 
        .faculty-message {
            text-align: center;
            color:#9b59b6;
            font-weight: 600;
            font-size: 16px;
            margin: 15px 0;
        }
        .form-actions { 
            display: flex; 
            gap: 12px; 
            margin-top: 20px; 
        }

        .btn { 
            display: inline-flex;
            justify-content: center;
            align-items: center;
            padding: 10px 20px; 
            font-size: 0.95rem; 
            font-weight: 600; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            text-decoration: none; 
            width: 100%; 
            height: 42px;
        }
        .btn-submit { background-color: #9b59b6; color: white; } /* Styled submit button to match header bar */
        .btn-submit:hover { background-color: #8e44ad; }
        .btn-back { background-color: #e2e8f0; color: #4a5568; }
        .btn-back:hover { opacity: 0.9; }
        
        :root[data-theme="dark"] .btn-back { background-color: #4b5563; color: #f3f4f6; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Add New Faculty</h1>
        <div class="theme-switch-wrapper">
            <span style="font-size: 0.85rem; font-weight:600; color:var(--text-sub);">Dark Mode</span>
            <label class="theme-switch"><input type="checkbox" id="checkbox" /><div class="slider"></div></label>
        </div>
    </header>

    <div class="card">
        <form id="facultyForm" method="post" th:action="@{/addfacultytotable}">
            <div class="form-group">
                <label>Faculty Number / ID</label>
                <input type="text" name="facultyid" class="form-control" placeholder="e.g., F202" required>
            </div>
            <div class="form-group">
                <label>Faculty Name</label>
                <input type="text" name="facultyname" class="form-control" placeholder="Enter full name" required>
            </div>
            <div class="form-group">
                <label>Branch ID / Department ID</label>
                <input name="branch.branchid" type="text" class="form-control" placeholder="e.g., Information Technology" required>
            </div>
            <div class="form-group">
                <label>Designation</label>
                <input type="text" name="designation" class="form-control" placeholder="e.g., Assistant Professor" required>
            </div>
            <p class="faculty-message" th:if="${facultymessage}" th:text="${facultymessage}"></p>
            <div class="form-actions">
                <button type="submit" class="btn btn-submit">Submit</button>
                <a th:href="@{/}" class="btn btn-back">Back</a>
            </div>
            
        </form>
    </div>
</div>

<script>
    const toggleSwitch = document.querySelector('.theme-switch input[type="checkbox"]');
    if (localStorage.getItem('theme') === 'dark') { 
        document.documentElement.setAttribute('data-theme', 'dark'); 
        toggleSwitch.checked = true; 
    }
    toggleSwitch.addEventListener('change', (e) => {
        const theme = e.target.checked ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
    });
</script>
</body>
</html>
