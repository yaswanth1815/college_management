<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Branch</title>
    <style>
        :root[data-theme="light"] { --bg: #f4f6f9; --card: #ffffff; --text: #2c3e50; --sub: #7f8c8d; --border: #cccccc; --input: #ffffff; }
        :root[data-theme="dark"] { --bg: #121212; --card: #1e1e1e; --text: #f3f4f6; --sub: #9ca3af; --border: #444444; --input: #2d2d2d; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; transition: 0.3s ease; }
        body { background-color: var(--bg); color: var(--text); padding: 20px; overflow: hidden; }
        .container { max-width: 550px; margin: 0 auto; }
        .top-navbar { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 20px; }
        .portal-heading h1 { font-size: 1.6rem; }
        .portal-heading p { color: var(--sub); font-size: 0.85rem; margin-top: 2px; }
        .theme-switch-wrapper { display: flex; align-items: center; gap: 8px; white-space: nowrap; font-size: 0.8rem; font-weight: 600; color: var(--sub); }
        .theme-switch { position: relative; display: inline-block; width: 46px; height: 22px; }
        .theme-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; border-radius: 20px; }
        :root[data-theme="dark"] .slider { background-color: #4b5563; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: #fff; border-radius: 50%; }
        input:checked + .slider:before { transform: translateX(24px); background-color:  #e67e22; }
        .card { background: var(--card); border-radius: 8px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 4px solid #e67e22; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.85rem; }
        .form-control { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; background-color: var(--input); color: var(--text); font-size: 0.95rem; outline: none; }
        .form-control:focus { border-color: #e67e22; box-shadow: 0 0 0 3px rgba(230, 126, 34, 0.15); }
        .form-actions { display: flex; gap: 12px; margin-top: 20px; }
        .btn { width: 100%; padding: 10px; font-size: 0.95rem; font-weight: 600; text-align: center; border: none; border-radius: 6px; cursor: pointer; text-decoration: none; }
        .btn-submit { background-color: #e67e22; color: white; }
        .btn-submit:hover { background-color: #d35400; }
        .btn-back { background-color: #eceff1; color: #37474f; }
        .btn-back:hover { background-color: #cfd8dc; }
        :root[data-theme="dark"] .btn-back { background-color: #374151; color: #e5e7eb; }
        :root[data-theme="dark"] .btn-back:hover { background-color: #4b5563; }
        .branch-message {text-align: center;color:#d35400; ;font-weight: 600;font-size: 16px;margin: 15px 0;}
        @media (max-width: 500px) { .top-navbar { flex-direction: column; align-items: flex-start; gap: 10px; } .theme-switch-wrapper { align-self: flex-end; } .form-actions { flex-direction: column; } }
    </style>
</head>
<body>
<div class="container">
    <div class="top-navbar">
        <div class="portal-heading">
            <h1>Add New Branch</h1>
            <p>Register a new department branch</p>
        </div>
        <div class="theme-switch-wrapper">
            <span>Dark Mode</span>
            <label class="theme-switch"><input type="checkbox" id="checkbox"><div class="slider"></div></label>
        </div>
    </div>
    <div class="card">
        <form id="branchForm" method="post" th:action="@{/addbranchtotable}">
            <div class="form-group">
                <label for="branchid">Branch ID</label>
                <input type="text" id="branchid" name="branchid" class="form-control" placeholder="e.g., B301" required>
            </div>
            <div class="form-group">
                <label for="branchname">Branch Name</label>
                <input type="text" id="branchname" name="branchname" class="form-control" placeholder="e.g., Computer Science" required>
            </div>
            <p class="branch-message" th:if="${branchmessage}" th:text="${branchmessage}"></p>
            <div class="form-actions">
                <button type="submit" class="btn btn-submit">Submit</button>
                <a th:href="@{/}" class="btn btn-back">Back</a>
            </div>
        </form>
    </div>
</div>
<script>
    const toggleSwitch = document.querySelector('.theme-switch input[type="checkbox"]');
    if (localStorage.getItem('theme') === 'dark') { document.documentElement.setAttribute('data-theme', 'dark'); toggleSwitch.checked = true; }
    toggleSwitch.addEventListener('change', (e) => {
        const theme = e.target.checked ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
    });
</script>
</body>
</html>
