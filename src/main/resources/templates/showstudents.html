<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Students</title>
    <style>
        :root[data-theme="light"] { --bg: #f4f6f9; --card: #ffffff; --text: #2c3e50; --sub: #7f8c8d; --border: #cccccc; --theme: #2563eb; --row-hover: #f8fafc; }
        :root[data-theme="dark"] { --bg: #121212; --card: #1e1e1e; --text: #f3f4f6; --sub: #9ca3af; --border: #444444; --theme: #3b82f6; --row-hover: #2d2d2d; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; transition: 0.2s ease; }
        body { background-color: var(--bg); color: var(--text); padding: 15px; overflow: hidden; }
        .container { max-width: 800px; margin: 0 auto; }
        .top-navbar { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 15px; }
        .portal-heading h1 { font-size: 1.4rem; }
        .portal-heading p { color: var(--sub); font-size: 0.8rem; }
        .theme-switch-wrapper { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--sub); font-weight: 600; }
        .theme-switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .theme-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; border-radius: 20px; }
        :root[data-theme="dark"] .slider { background-color: #4b5563; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: #fff; border-radius: 50%; }
        input:checked + .slider:before { transform: translateX(20px); background-color: #2563eb; }
        .card { background: var(--card); border-radius: 8px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 4px solid var(--theme); }
        .table-wrapper { width: 100%; overflow-x: auto; margin-bottom: 15px; max-height: 350px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.9rem; }
        th { background-color: var(--bg); color: var(--text); font-weight: 600; padding: 10px; border-bottom: 2px solid var(--border); sticky: top; }
        td { padding: 10px; border-bottom: 1px solid var(--border); }
        tr:hover { background-color: var(--row-hover); }
        .btn-back { display: inline-block; padding: 8px 20px; font-size: 0.9rem; font-weight: 600; text-align: center; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; background-color: #eceff1; color: #37474f; }
        :root[data-theme="dark"] .btn-back { background-color: #374151; color: #e5e7eb; }
    </style>
</head>
<body>
<div class="container">
    <div class="top-navbar">
        <div class="portal-heading"><h1>Student Database</h1><p>Registered students management list</p></div>
        <div class="theme-switch-wrapper"><span>Dark Mode</span><label class="theme-switch"><input type="checkbox" id="checkbox"><div class="slider"></div></label></div>
    </div>
    <div class="card">
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr><th>Roll Number</th><th>Student Name</th><th>Year</th><th>Semester</th><th>Branch</th></tr>
                </thead>
                <tbody id="studentTableBody">
                    <tr th:each="student:${listofstudents}">
                        <td th:text="${student.studentroll}"></td>
                        <td th:text="${student.studentname}"></td>
                        <td th:text="${student.curryear}"></td>
                        <td th:text="${student.currsemester}"></td>
                        <td th:text="${student.branch.branchname}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
        <a th:href="@{/}" class="btn-back">Back to Dashboard</a>
    </div>
</div>
<script>
    const toggleSwitch = document.querySelector('.theme-switch input[type="checkbox"]');
    if (localStorage.getItem('theme') === 'dark') { document.documentElement.setAttribute('data-theme', 'dark'); toggleSwitch.checked = true; }
    toggleSwitch.addEventListener('change', (e) => { const theme = e.target.checked ? 'dark' : 'light'; document.documentElement.setAttribute('data-theme', theme); localStorage.setItem('theme', theme); });
</script>
</body>
</html>
