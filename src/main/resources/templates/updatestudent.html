<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Update Student</title>
<style>
:root[data-theme="light"] { --bg:#f4f6f9; --card:#ffffff; --text:#2c3e50; --sub:#7f8c8d; --border:#cccccc; --input:#ffffff; --theme:#2563eb; }
:root[data-theme="dark"] { --bg:#121212; --card:#1e1e1e; --text:#f3f4f6; --sub:#9ca3af; --border:#444444; --input:#2d2d2d; --theme:#3b82f6; }
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;transition:.2s ease;}
body{background:var(--bg);color:var(--text);padding:15px;overflow:hidden;}
.container{max-width:500px;margin:0 auto;}
.top-navbar{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);padding-bottom:8px;margin-bottom:15px;}
.portal-heading h1{font-size:1.4rem}.portal-heading p{color:var(--sub);font-size:.8rem}
.theme-switch-wrapper{display:flex;align-items:center;gap:6px;font-size:.75rem;color:var(--sub);font-weight:600}
.theme-switch{position:relative;display:inline-block;width:40px;height:20px}
.theme-switch input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#cbd5e1;border-radius:20px}
:root[data-theme="dark"] .slider{background:#4b5563}
.slider:before{position:absolute;content:"";height:14px;width:14px;left:3px;bottom:3px;background:#fff;border-radius:50%}
input:checked + .slider:before{transform:translateX(20px);background:#2563eb}
.card{background:var(--card);border-radius:8px;padding:15px;box-shadow:0 4px 6px rgba(0,0,0,.05);border-top:4px solid var(--theme)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:15px}
.form-group{display:flex;flex-direction:column}.full-width{grid-column:span 2}
label{font-weight:600;font-size:.8rem;margin-bottom:4px}
.form-control{width:100%;padding:8px;border:1px solid var(--border);border-radius:5px;background:var(--input);color:var(--text);font-size:.9rem;outline:none}
.form-control:focus{border-color:var(--theme)}
.form-actions{display:flex;gap:10px}.btn{width:100%;padding:10px;font-size:.9rem;font-weight:600;text-align:center;border:none;border-radius:5px;cursor:pointer;text-decoration:none}
.btn-submit{background:var(--theme);color:#fff}.btn-back{background:#eceff1;color:#37474f}
:root[data-theme="dark"] .btn-back{background:#374151;color:#e5e7eb}
.update-message{text-align:center;color:#2563eb;font-weight:600;font-size:16px;margin:15px 0;}
@media (max-width:500px){.form-grid{grid-template-columns:1fr}.full-width{grid-column:span 1}}
</style></head><body>
<div class="container"><div class="top-navbar"><div class="portal-heading"><h1>Update Student</h1><p>Modify student information details</p></div><div class="theme-switch-wrapper"><span>Dark Mode</span><label class="theme-switch"><input type="checkbox" id="checkbox"><div class="slider"></div></label></div></div>
<div class="card"><form id="studentForm" method="post" th:action="@{/updatestudentintable}"><div class="form-grid">
<div class="form-group full-width">
    <label for="studentid">Roll Number</label>
    <input type="text" name="studentroll" id="studentid" class="form-control" placeholder="e.g., S101" required>
</div>
<div class="form-group full-width">
    <label for="studentname">Student Name</label>
    <input type="text" name="studentname" id="studentname" class="form-control" placeholder="e.g., John Doe">
</div>
<div class="form-group">
    <label for="curryear">Current Year</label>
    <select id="curryear" name="curryear" class="form-control">
        <option value="0">Select Year</option>
        <option value="1">1st Year</option>
        <option value="2">2nd Year</option>
        <option value="3">3rd Year</option>
        <option value="4">4th Year</option>
    </select>
</div>
<div class="form-group">
    <label for="cursemester">Current Semester</label>
    <select id="cursemester" name="currsemester" class="form-control">
        <option value="0">Select Semester</option>
        <option value="1">Semester 1</option>
        <option value="2">Semester 2</option>
    </select>
</div>
<div class="form-group full-width">
    <label for="branch">Branch ID</label>
    <input name="branch.branchid" type="text" id="branch" class="form-control" placeholder="e.g., Computer Science">
</div>
</div>
<p class="update-message" th:if="${updatemessage}" th:text="${updatemessage}"></p>
<div class="form-actions"><button type="submit" class="btn btn-submit">Update Student</button><a th:href="@{/}" class="btn btn-back">Back</a></div>
</form></div></div>
<script>
const toggleSwitch=document.querySelector('.theme-switch input[type="checkbox"]');
if(localStorage.getItem('theme')==='dark'){document.documentElement.setAttribute('data-theme','dark');toggleSwitch.checked=true;}
toggleSwitch.addEventListener('change',e=>{const theme=e.target.checked?'dark':'light';document.documentElement.setAttribute('data-theme',theme);localStorage.setItem('theme',theme);});
</script></body></html>
